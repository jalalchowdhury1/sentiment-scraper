# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
name: Daily Sentiment Scrape

on:
  workflow_dispatch:    # ← allows “Run workflow” on GitHub
  # Runs every day at 03:00 UTC (adjust if you want local time)
  schedule:
    - cron: '0 3 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: npx ts-node sentiment-scraper.ts
        env:
         GOOGLE_API_KEY:               ${{ secrets.GOOGLE_API_KEY }}
         GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
         BROWSERBASE_API_KEY:          ${{ secrets.BROWSERBASE_API_KEY }}
         BROWSERBASE_PROJECT_ID:       ${{ secrets.BROWSERBASE_PROJECT_ID }}
         GOOGLE_SHEETS_CREDENTIALS:    ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
