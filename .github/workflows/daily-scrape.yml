# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
name: Daily Sentiment Scrape

# …
on:
  workflow_dispatch:
    inputs:
      retry_count:
        description: 'Number of retry attempts so far'
        required: false
        default: '0'
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC = 04:00 EDT

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      actions: write  # Allow triggering workflow_dispatch on retry

    # 👇 Job-level env ensures every step sees these
    env:
      GOOGLE_API_KEY:               ${{ secrets.GOOGLE_API_KEY }}
      GOOGLE_SHEETS_CREDENTIALS:    ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
      TELEGRAM_BOT_TOKEN:           ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:             ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - run: npm ci

      - name: Install Playwright browsers
        run: node node_modules/playwright/cli.js install --with-deps chromium

      - name: Run scraper
        id: scraper
        run: npx ts-node sentiment-scraper.ts
        continue-on-error: true

      - name: Retry on failure
        if: always() && steps.scraper.outcome != 'success'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RETRY_COUNT: ${{ github.event.inputs.retry_count || '0' }}
          MAX_RETRIES: 10  # 10 retries × 15 min = 2.5 hours max
        run: |
          CURRENT_RETRY=$((RETRY_COUNT))
          NEXT_RETRY=$((CURRENT_RETRY + 1))

          echo "Scraper failed on attempt $((CURRENT_RETRY + 1))"

          if [ $CURRENT_RETRY -lt $MAX_RETRIES ]; then
            echo "Scheduling retry $NEXT_RETRY in 15 minutes..."
            sleep 900  # 15 minutes = 900 seconds

            echo "Triggering retry attempt $NEXT_RETRY via GitHub API..."
            curl -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/daily-scrape.yml/dispatches \
              -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"retry_count\":\"$NEXT_RETRY\"}}"

            echo "Retry scheduled successfully"
          else
            echo "Max retries ($MAX_RETRIES) reached. Giving up."
            if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode text="🚨 sentiment-scraper CRITICAL: daily scrape failed after ${MAX_RETRIES} retries. Sheet keeps last good value. https://github.com/${{ github.repository }}/actions" || true
            fi
            exit 1
          fi

      - name: Mark as failed if scraper failed
        if: always() && steps.scraper.outcome != 'success'
        run: exit 1
