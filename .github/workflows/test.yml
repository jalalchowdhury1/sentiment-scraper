name: Test Layers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
      - run: node node_modules/playwright/cli.js install --with-deps chromium
      - run: npx ts-node test-layers.ts
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

  test-layer4:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
      - run: node node_modules/playwright/cli.js install --with-deps chromium
      - name: Test Layer 4 Standalone (costs API credits)
        run: npx ts-node test-comprehensive.ts --layer4
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

  scrape:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
      - run: node node_modules/playwright/cli.js install --with-deps chromium
      - run: npx ts-node sentiment-scraper.ts
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          DRY_RUN: "1"
